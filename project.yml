name: OpenCodePocket
options:
  minimumXcodeGenVersion: 2.38.0
  deploymentTarget:
    iOS: "26.0"
    macOS: "26.0"
settings:
  base:
    SWIFT_VERSION: 5.10
packages:
  OpenCodeSDK:
    path: Packages/OpenCodeSDK
  TranscriptUI:
    path: Packages/TranscriptUI
targets:
  OpenCodePocket:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: OpenCodePocket
        excludes:
          - Support/Info.plist
    info:
      path: OpenCodePocket/Support/Info.plist
      properties:
        CFBundleName: OpenCodePocket
        CFBundleDisplayName: OpenCode Pocket
        UIApplicationSupportsIndirectInputEvents: true
        UILaunchScreen: {}
        NSAppTransportSecurity:
          NSExceptionDomains:
            claudl.taile64ce5.ts.net:
              NSExceptionAllowsInsecureHTTPLoads: true
              NSIncludesSubdomains: true
    settings:
      base:
        PRODUCT_NAME: OpenCodePocket
        PRODUCT_BUNDLE_IDENTIFIER: sh.851.opencode-pocket
        DEVELOPMENT_TEAM: WH4QW9ND3J
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SDKROOT: auto
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator macosx"
        TARGETED_DEVICE_FAMILY: "1,2,7"
        IPHONEOS_DEPLOYMENT_TARGET: "26.0"
        MACOSX_DEPLOYMENT_TARGET: "26.0"
        SUPPORTS_MACCATALYST: NO
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        LD_RUNPATH_SEARCH_PATHS: "@executable_path/Frameworks"
        "LD_RUNPATH_SEARCH_PATHS[sdk=macosx*]": "@executable_path/../Frameworks"
        "EXCLUDED_SOURCE_FILE_NAMES[sdk=macosx*]": "ConnectView.swift SessionsView.swift WorkspaceView.swift */Features/Workspace/*"
        "EXCLUDED_SOURCE_FILE_NAMES[sdk=iphoneos*]": "MacConnectView.swift MacWorkspaceView.swift */Features/MacWorkspace/* */FeaturesV2/Settings/MacSettings/*"
        "EXCLUDED_SOURCE_FILE_NAMES[sdk=iphonesimulator*]": "MacConnectView.swift MacWorkspaceView.swift */Features/MacWorkspace/* */FeaturesV2/Settings/MacSettings/*"
    dependencies:
      - package: OpenCodeSDK
        product: OpenCodeModels
      - package: OpenCodeSDK
        product: OpenCodeNetworking
      - package: TranscriptUI
        product: TranscriptUI
  OpenCodePocketTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: OpenCodePocketTests
    dependencies:
      - target: OpenCodePocket
      - package: OpenCodeSDK
        product: OpenCodeModels
      - package: OpenCodeSDK
        product: OpenCodeNetworking
    settings:
      base:
        PRODUCT_NAME: OpenCodePocketTests
        GENERATE_INFOPLIST_FILE: YES
        SDKROOT: iphoneos
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
  OpenCodePocketUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: OpenCodePocketUITests
    dependencies:
      - target: OpenCodePocket
    settings:
      base:
        PRODUCT_NAME: OpenCodePocketUITests
        GENERATE_INFOPLIST_FILE: YES
        SDKROOT: iphoneos
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"

schemes:
  OpenCodePocket:
    build:
      targets:
        OpenCodePocket: all
    test:
      gatherCoverageData: true
      targets:
        - OpenCodePocketTests
        - OpenCodePocketUITests
