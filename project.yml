name: OpenCodePocket
options:
  minimumXcodeGenVersion: 2.38.0
  deploymentTarget:
    iOS: "26.0"
settings:
  base:
    SWIFT_VERSION: 5.10
packages:
  OpenCodeSDK:
    path: Packages/OpenCodeSDK
targets:
  OpenCodePocket:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: OpenCodePocket
        excludes:
          - Support/Info.plist
    info:
      path: OpenCodePocket/Support/Info.plist
      properties:
        CFBundleName: OpenCodePocket
        CFBundleDisplayName: OpenCode Pocket
        UIApplicationSupportsIndirectInputEvents: true
        UILaunchScreen: {}
        NSAppTransportSecurity:
          NSExceptionDomains:
            claudl.taile64ce5.ts.net:
              NSExceptionAllowsInsecureHTTPLoads: true
              NSIncludesSubdomains: true
    settings:
      base:
        PRODUCT_NAME: OpenCodePocket
        PRODUCT_BUNDLE_IDENTIFIER: sh.851.opencode-pocket
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
    dependencies:
      - package: OpenCodeSDK
        product: OpenCodeModels
      - package: OpenCodeSDK
        product: OpenCodeNetworking
  OpenCodePocketTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: OpenCodePocketTests
    dependencies:
      - target: OpenCodePocket
      - package: OpenCodeSDK
        product: OpenCodeModels
      - package: OpenCodeSDK
        product: OpenCodeNetworking
    settings:
      base:
        PRODUCT_NAME: OpenCodePocketTests
        GENERATE_INFOPLIST_FILE: YES
  OpenCodePocketUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: OpenCodePocketUITests
    dependencies:
      - target: OpenCodePocket
    settings:
      base:
        PRODUCT_NAME: OpenCodePocketUITests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  OpenCodePocket:
    build:
      targets:
        OpenCodePocket: all
    test:
      gatherCoverageData: true
      targets:
        - OpenCodePocketTests
        - OpenCodePocketUITests
